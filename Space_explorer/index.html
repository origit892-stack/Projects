<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deep Space Survivor</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <div class="hud" aria-label="Deep Space Survivor HUD">
      <div>
        <span class="label">DEEP SPACE SURVIVOR</span>
        <strong id="score">0</strong>
      </div>
      <div>
        <span class="label">Hull</span>
        <strong id="hull">100%</strong>
      </div>
      <div>
        <span class="label">Wave</span>
        <strong id="wave">1</strong>
      </div>
    </div>
    <div class="reticle" aria-hidden="true"></div>
    <div id="start-panel" class="start-panel">
      <h1>Deep Space Survivor</h1>
      <p>WASD / arrows to strafe, hold left click to fire.</p>
      <button id="start-button">Launch</button>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
