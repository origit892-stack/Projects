<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Island Miner</title>
    <style>
      html,
      body,
      #game-root {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #10181f;
      }

      canvas {
        display: block;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <main id="game-root" aria-label="Island Miner"></main>
    <script type="module">
      import Phaser from 'phaser';
      import MainScene from './src/scenes/MainScene.js';

      const config = {
        type: Phaser.AUTO,
        parent: 'game-root',
        width: 960,
        height: 540,
        backgroundColor: '#10181f',
        pixelArt: true,
        physics: {
          default: 'arcade',
          arcade: {
            gravity: { y: 0 },
            debug: false,
          },
        },
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH,
        },
        scene: [MainScene],
      };

      window.__ISLAND_MINER__ = new Phaser.Game(config);
    </script>
  </body>
</html>
