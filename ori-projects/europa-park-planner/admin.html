<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow,noarchive"><meta name="theme-color" content="#071d49">
  <title>Europa Crew — ניהול הרשימות</title>
  <style>
    :root{--navy:#071d49;--blue:#1268d7;--gold:#ffc928;--ink:#14233c;--muted:#6b7890;--line:#e3eaf4;--green:#17a56a;--red:#d64655}*{box-sizing:border-box}body{margin:0;min-width:320px;font-family:Arial,"Noto Sans Hebrew",sans-serif;color:var(--ink);background:#f3f7fc}.top{padding:26px 0 72px;color:#fff;background:linear-gradient(125deg,#06183d,#0c3b82)}.wrap{width:min(1120px,calc(100% - 28px));margin:auto}.nav{display:flex;align-items:center;justify-content:space-between;gap:16px}.brand{display:flex;align-items:center;gap:10px;font-size:19px;font-weight:900}.mark{width:42px;height:42px;display:grid;place-items:center;border-radius:13px;color:var(--navy);background:var(--gold)}.live{display:flex;align-items:center;gap:9px;padding:9px 14px;border:1px solid rgba(255,255,255,.17);border-radius:999px;background:rgba(255,255,255,.08);font-size:12px;font-weight:800}.dot{width:8px;height:8px;border-radius:50%;background:var(--gold)}.live.ok .dot{background:#47e29d;box-shadow:0 0 0 5px rgba(71,226,157,.12)}h1{margin:45px 0 8px;font-size:clamp(35px,7vw,58px);letter-spacing:-.05em}.subtitle{margin:0;color:rgba(255,255,255,.72)}main{margin-top:-44px;padding-bottom:60px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;overflow:hidden;border-radius:20px;background:var(--line);box-shadow:0 15px 40px rgba(7,29,73,.12)}.stat{padding:22px;background:#fff}.stat span{display:block;color:var(--muted);font-size:12px;font-weight:700}.stat strong{display:block;margin-top:7px;color:var(--navy);font-size:31px}.head{display:flex;align-items:end;justify-content:space-between;gap:16px;margin:35px 0 16px}.head h2{margin:0;color:var(--navy);font-size:28px}.head p{margin:5px 0 0;color:var(--muted);font-size:13px}.search{width:min(320px,100%);height:44px;padding:0 14px;border:1px solid var(--line);border-radius:12px;background:#fff;outline:0}.search:focus{border-color:#7bb0ed;box-shadow:0 0 0 3px rgba(18,104,215,.1)}.profiles{display:grid;gap:13px}.profile{display:grid;grid-template-columns:190px 1fr;overflow:hidden;border:1px solid var(--line);border-radius:18px;background:#fff;box-shadow:0 5px 18px rgba(7,29,73,.05)}.person{padding:20px;border-left:1px solid var(--line);background:#fbfcfe}.person h3{margin:0 0 8px;color:var(--navy);font-size:20px}.count{color:var(--blue);font-weight:900}.time{display:block;margin-top:10px;color:var(--muted);font-size:10px}.selections{display:flex;flex-wrap:wrap;align-content:center;gap:7px;padding:20px}.ride{padding:7px 10px;border-radius:999px;color:#174d8f;background:#edf5ff;font-size:11px;font-weight:700}.none{color:var(--muted);font-size:12px}.error{display:none;padding:28px;border:1px solid #f2cbd0;border-radius:18px;color:#9f2737;background:#fff1f3;text-align:center}.error.show{display:block}.empty{padding:50px;border:1px dashed #cbd7e6;border-radius:18px;color:var(--muted);background:#fff;text-align:center}@media(max-width:700px){.stats{grid-template-columns:1fr}.head{align-items:stretch;flex-direction:column}.profile{grid-template-columns:1fr}.person{border-left:0;border-bottom:1px solid var(--line)}.top{padding-bottom:62px}}
  </style>
</head>
<body>
  <header class="top"><div class="wrap"><div class="nav"><div class="brand"><span class="mark">EP</span><span>Europa Crew · מנהל</span></div><div class="live" id="live"><span class="dot"></span><span id="liveText">מתחבר…</span></div></div><h1>הבחירות של כולם</h1><p class="subtitle">תצוגת מנהל פרטית שמתעדכנת אוטומטית מהשרת.</p></div></header>
  <main><div class="wrap"><section class="stats"><div class="stat"><span>שמות שנפתחו</span><strong id="profileCount">—</strong></div><div class="stat"><span>בחירות בסך הכול</span><strong id="selectionCount">—</strong></div><div class="stat"><span>עדכון אחרון</span><strong id="updatedAt" style="font-size:17px">—</strong></div></section><div class="head"><div><h2>רשימות אישיות</h2><p>כל שם מציג את המתקנים שסומנו עבורו.</p></div><input class="search" id="search" type="search" placeholder="חיפוש שם או מתקן…"></div><div class="error" id="error">קישור המנהל חסר או שאינו תקין. יש לפתוח את הקישור הסודי המלא.</div><div class="profiles" id="profiles"></div></div></main>
  <script src="attractions.js"></script>
  <script>
    const token=decodeURIComponent(location.hash.slice(1)),rides=window.ATTRACTIONS||[],rideNames=new Map(rides.map(r=>[r.id,r.name]));let latest=null,query='';
    const $=id=>document.getElementById(id);function esc(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function selectedIds(profile){return Object.entries(profile.selections||{}).filter(([,checked])=>checked).map(([id])=>id)}function formatTime(value){if(!value)return'אין עדיין';return new Intl.DateTimeFormat('he-IL',{dateStyle:'short',timeStyle:'medium'}).format(new Date(value))}
    function render(){if(!latest)return;const profiles=latest.profiles||[],filtered=profiles.filter(p=>{const hay=`${p.name} ${selectedIds(p).map(id=>rideNames.get(id)||id).join(' ')}`.toLowerCase();return!query||hay.includes(query)});$('profileCount').textContent=profiles.length;$('selectionCount').textContent=profiles.reduce((n,p)=>n+selectedIds(p).length,0);$('updatedAt').textContent=formatTime(latest.updatedAt);$('profiles').innerHTML=filtered.length?filtered.map(p=>{const ids=selectedIds(p);return`<article class="profile"><div class="person"><h3>${esc(p.name)}</h3><span class="count">${ids.length} מתקנים</span><span class="time">עודכן: ${esc(formatTime(p.updatedAt))}</span></div><div class="selections">${ids.length?ids.map(id=>`<span class="ride">${esc(rideNames.get(id)||id)}</span>`).join(''):'<span class="none">עדיין לא סומנו מתקנים.</span>'}</div></article>`}).join(''):'<div class="empty">לא נמצאו רשימות מתאימות.</div>'}
    async function refresh(){if(!token){$('error').classList.add('show');$('liveText').textContent='אין הרשאה';return}try{const response=await fetch('/europa-park-planner-api/admin/state',{headers:{Authorization:`Bearer ${token}`},cache:'no-store'});if(!response.ok)throw new Error('unauthorized');latest=await response.json();$('error').classList.remove('show');$('live').classList.add('ok');$('liveText').textContent='מחובר · עדכון חי';render()}catch{$('error').classList.add('show');$('live').classList.remove('ok');$('liveText').textContent='אין הרשאה או חיבור'}}
    $('search').addEventListener('input',e=>{query=e.target.value.trim().toLowerCase();render()});refresh();setInterval(refresh,1500);
  </script>
</body></html>
