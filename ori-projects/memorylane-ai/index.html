<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>MemoryLane AI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #2a5c5a; text-align: center; margin-bottom: 20px; }
        .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; }
        .panel { background: #fafbfc; padding: 20px; border-radius: 6px; border: 1px solid #e1e4e6; display: flex; flex-direction: column; justify-content: space-between; min-height: 380px; }
        .full-width-panel { background: #fafbfc; padding: 20px; border-radius: 6px; border: 1px solid #e1e4e6; margin-bottom: 25px; }
        h3 { color: #1a3a38; margin-top: 0; border-bottom: 1px solid #e1e4e6; padding-bottom: 10px; }
        .chat-box { height: 300px; background: #fff; border: 1px solid #ddd; padding: 15px; overflow-y: auto; border-radius: 4px; margin-bottom: 15px; }
        .message { margin-bottom: 12px; padding: 10px 14px; border-radius: 6px; max-width: 80%; line-height: 1.5; }
        .user { background: #e6edea; margin-right: auto; text-align: right; }
        .bot { background: #f1f1f1; margin-left: auto; text-align: left; }
        .input-area { display: flex; gap: 10px; }
        .input-area input { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 4px; min-width: 0; }
        .btn { background: #2a5c5a; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-location { background: #d97736; margin-top: 10px; width: 100%; padding: 12px; }
        .btn-action { padding: 6px 12px; font-size: 11pt; background: #2a5c5a; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #cc4444; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: right; }
        th { background-color: #e6edea; color: #1a3a38; }
        .med-alert { display: none; background: #ffdddd; border: 2px solid #cc4444; color: #993333; padding: 15px; border-radius: 6px; font-weight: bold; font-size: 16pt; margin-bottom: 20px; text-align: center; }
        @media (max-width: 820px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            .main-layout { grid-template-columns: 1fr; }
            .input-area { flex-direction: column; }
            .message { max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MemoryLane AI</h1>
        <div id="medicationAlert" class="med-alert">
            🚨 תזכורת תרופה דחופה: הגיע הזמן לקחת <span id="alertMedName"></span>!
            <br><button class="btn" style="background:#cc4444; margin-top:10px;" onclick="dismissAlert()">אישרתי, לקחתי</button>
        </div>

        <div class="main-layout">
            <div class="panel">
                <div>
                    <h3>👥 אזור המשפחה והנגישות</h3>
                    <button class="btn btn-location" onclick="shareLocation()">שתף מיקום להצעות חוגים</button>
                </div>
            </div>

            <div class="panel">
                <div>
                    <h3>💬 שיחה עם MemoryLane</h3>
                    <div id="chatBox" class="chat-box">
                        <div class="message bot">שלום, אני MemoryLane. איך קוראים לך?</div>
                    </div>
                </div>
                <div class="input-area">
                    <input id="messageInput" type="text" placeholder="כתבו כאן הודעה...">
                    <button class="btn" onclick="sendMessage()">שלח</button>
                </div>
            </div>
        </div>

        <div class="full-width-panel">
            <h3>📍 חוגים ופעילויות באזור</h3>
            <div class="input-area">
                <input id="addressInput" type="text" placeholder="הכניסו כתובת או אזור מגורים">
                <button class="btn" onclick="saveAddress()">עדכן כתובת</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>שם הפעילות</th>
                        <th>מיקום</th>
                        <th>זמן</th>
                        <th>פעולה</th>
                    </tr>
                </thead>
                <tbody id="classesTable"></tbody>
            </table>
        </div>

        <div class="full-width-panel">
            <h3>💊 תזכורות תרופות</h3>
            <div class="input-area">
                <input id="medName" type="text" placeholder="שם התרופה">
                <input id="medTime" type="time">
                <button class="btn" onclick="addMedication()">הוסף תזכורת</button>
            </div>
            <button class="btn btn-location" onclick="enableNotifications()">אפשר התרעות בדפדפן</button>
            <button class="btn btn-location" onclick="sendTestNotification()">בדיקת התרעה</button>
            <table>
                <thead>
                    <tr>
                        <th>תרופה</th>
                        <th>שעה</th>
                        <th>פעולה</th>
                    </tr>
                </thead>
                <tbody id="medicationsTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const apiBase = `${window.location.origin}/memorylane-ai-api`;
        const sessionId = sessionStorage.getItem('memorylane-session-id') || crypto.randomUUID();
        sessionStorage.setItem('memorylane-session-id', sessionId);
        localStorage.removeItem('memorylane-name');
        localStorage.removeItem('memorylane-address');
        localStorage.removeItem('memorylane-latitude');
        localStorage.removeItem('memorylane-longitude');
        localStorage.removeItem('memorylane-nearby-classes');
        let address = '';
        let latitude = null;
        let longitude = null;
        let nearbyClasses = [];
        let searchedActivities = false;
        let medications = JSON.parse(localStorage.getItem('memorylane-meds') || '[]');
        let registered = JSON.parse(localStorage.getItem('memorylane-classes') || '[]');
        let lastAlertMinute = '';
        let audioContext;
        let pushSubscriptionReady = false;

        function saveLocal() {
            localStorage.setItem('memorylane-meds', JSON.stringify(medications));
            localStorage.setItem('memorylane-classes', JSON.stringify(registered));
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = 'message ' + type;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function playAlertSound() {
            try {
                audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gain = audioContext.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioContext.currentTime);
                oscillator.frequency.setValueAtTime(660, audioContext.currentTime + 0.22);
                gain.gain.setValueAtTime(0.0001, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.25, audioContext.currentTime + 0.03);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.55);
                oscillator.connect(gain);
                gain.connect(audioContext.destination);
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.6);
            } catch (error) {
                console.warn('Alert sound unavailable', error);
            }
        }

        async function geocodeAddress(value) {
            const params = new URLSearchParams({ q: value, format: 'json', addressdetails: '1', limit: '1' });
            const response = await fetch(`https://nominatim.openstreetmap.org/search?${params}`);
            const results = await response.json();
            if (!results.length) return null;
            return {
                address: results[0].display_name,
                latitude: Number(results[0].lat),
                longitude: Number(results[0].lon)
            };
        }

        async function reverseGeocode(lat, lon) {
            const params = new URLSearchParams({ lat, lon, format: 'json', addressdetails: '1', zoom: '18' });
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?${params}`);
            const result = await response.json();
            return result.display_name || `${lat}, ${lon}`;
        }

        function contactUrl(tags, lat, lon) {
            const web = tags['contact:website'] || tags.website || tags.url || tags['contact:facebook'];
            if (web) return web.startsWith('http') ? web : `https://${web}`;
            const email = tags['contact:email'] || tags.email;
            if (email) return `mailto:${email}`;
            const phone = tags['contact:phone'] || tags.phone;
            if (phone) return `tel:${phone}`;
            return '';
        }

        function cleanSearchLocation(location) {
            const value = (location || '').trim();
            const blocked = ['אין כתובת מלאה', 'כתובת לא זמינה', 'מיקום במפה', 'באזור הכתובת שהוזנה', 'מומלץ ליצור קשר'];
            return !value || blocked.some((phrase) => value.includes(phrase)) ? '' : value;
        }

        function searchContactUrl(name, location) {
            const cleanLocation = cleanSearchLocation(location);
            const query = [name || '', cleanLocation, 'יצירת קשר אתר רשמי'].filter(Boolean).join(' ').trim();
            return `https://www.google.com/search?q=${encodeURIComponent(query)}`;
        }

        function describeActivity(name, tags = {}) {
            const text = `${name || ''} ${tags.amenity || ''} ${tags.leisure || ''} ${tags.club || ''} ${tags.sport || ''}`.toLowerCase();
            if (['community_centre', 'מרכז תרבות', 'מרכז קהילתי'].some((word) => text.includes(word))) {
                return 'מרכז קהילתי או תרבותי עם פעילויות קהילה, מפגשים, הרצאות וחוגים. כדאי לבדוק באתר או בטלפון מה מתאים לגיל השלישי.';
            }
            if (['theatre', 'תיאטרון', 'תאטרון', 'קאמרי', 'גשר', 'אופרה'].some((word) => text.includes(word))) {
                return 'צפייה בהצגות, מופעים ופעילות תרבותית. כדאי לבדוק באתר זמני מופעים ונגישות.';
            }
            if (['library', 'ספרייה', 'ספריה'].some((word) => text.includes(word))) {
                return 'מפגש שקט סביב ספרים, הרצאות, קריאה ופעילות קהילתית.';
            }
            if (['arts', 'אומנות', 'אמנות', 'ציור'].some((word) => text.includes(word))) {
                return 'פעילות יצירה, אומנות, סדנאות ומפגש חברתי רגוע.';
            }
            if (['fitness', 'sports', 'יוגה', 'ספורט', 'התעמלות'].some((word) => text.includes(word))) {
                return 'פעילות גופנית קלה או חוג תנועה. מומלץ לברר התאמה ונגישות לפני ההגעה.';
            }
            if (['community', 'social', 'קהילתי', 'חברה'].some((word) => text.includes(word))) {
                return 'פעילות חברתית וקהילתית, מפגשים, הרצאות וחוגים באזור.';
            }
            return 'מקום קרוב שיכול להתאים לפעילות תרבותית או חברתית. כדאי לפתוח קישור ולבדוק פרטים.';
        }

        function normalizeActivity(item) {
            const name = item.name || 'מקום פעילות';
            const location = cleanSearchLocation(item.location) || item.location || '';
            return {
                ...item,
                name,
                location: location || 'באזור הכתובת שהוזנה',
                description: item.description || describeActivity(name),
                map_url: item.map_url || `https://www.openstreetmap.org/search?query=${encodeURIComponent(`${name} ${cleanSearchLocation(location)}`.trim())}`,
                search_url: searchContactUrl(name, location)
            };
        }

        function formatActivity(element) {
            const tags = element.tags || {};
            const lat = element.lat || (element.center && element.center.lat);
            const lon = element.lon || (element.center && element.center.lon);
            const addressParts = [tags['addr:street'], tags['addr:housenumber'], tags['addr:city']].filter(Boolean);
            const url = contactUrl(tags, lat, lon);
            const name = tags['name:he'] || tags.name || 'מקום פעילות קרוב';
            const location = addressParts.join(' ') || tags['addr:full'] || 'באזור הכתובת שהוזנה';
            return {
                id: `osm-${element.type}-${element.id}`,
                name,
                location,
                time: tags.opening_hours || 'מומלץ ליצור קשר לפני ההגעה',
                phone: tags['contact:phone'] || tags.phone || '',
                contact_url: url,
                note: 'אפשר לפתוח פרטי קשר ולבדוק הרשמה מול המקום.',
                map_url: lat && lon ? `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}#map=18/${lat}/${lon}` : `https://www.openstreetmap.org/search?query=${encodeURIComponent(`${name} ${location}`)}`,
                search_url: searchContactUrl(name, location),
                description: describeActivity(name, tags)
            };
        }

        async function searchNearbyActivities() {
            if (!latitude || !longitude) return [];
            const query = `
                [out:json][timeout:18];
                (
                  node(around:5000,${latitude},${longitude})["amenity"~"community_centre|social_facility|library|theatre|arts_centre"];
                  way(around:5000,${latitude},${longitude})["amenity"~"community_centre|social_facility|library|theatre|arts_centre"];
                  relation(around:5000,${latitude},${longitude})["amenity"~"community_centre|social_facility|library|theatre|arts_centre"];
                  node(around:5000,${latitude},${longitude})["leisure"~"sports_centre|fitness_centre|dance"];
                  way(around:5000,${latitude},${longitude})["leisure"~"sports_centre|fitness_centre|dance"];
                  relation(around:5000,${latitude},${longitude})["leisure"~"sports_centre|fitness_centre|dance"];
                  node(around:5000,${latitude},${longitude})["club"~"sport|social|senior|culture"];
                  way(around:5000,${latitude},${longitude})["club"~"sport|social|senior|culture"];
                  relation(around:5000,${latitude},${longitude})["club"~"sport|social|senior|culture"];
                );
                out center tags 20;
            `;
            const body = new URLSearchParams({ data: query });
            const response = await fetch('https://overpass-api.de/api/interpreter', { method: 'POST', body });
            const data = await response.json();
            const seen = new Set();
            return (data.elements || []).map(formatActivity).map(normalizeActivity).filter((item) => {
                if (!item.name || item.name === 'מקום פעילות קרוב') return false;
                if (seen.has(item.name)) return false;
                seen.add(item.name);
                return true;
            }).slice(0, 8);
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            messageInput.value = '';
            addMessage(message, 'user');
            try {
                const response = await fetch(`${apiBase}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id: sessionId })
                });
                const data = await response.json();
                addMessage(data.reply || 'לא התקבלה תשובה מהשרת.', 'bot');
            } catch (error) {
                addMessage('הצ׳אט החכם לא מחובר כרגע לשרת. צריך להפעיל את MemoryLane Flask API כדי לקבל תשובות אמיתיות.', 'bot');
            }
        }

        messageInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') sendMessage();
        });

        async function saveAddress() {
            const enteredAddress = document.getElementById('addressInput').value.trim();
            if (!enteredAddress) return;
            addMessage('מחפש מקומות קרובים לפי הכתובת...', 'bot');
            let data;
            try {
                const response = await fetch(`${apiBase}/api/address`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: enteredAddress, session_id: sessionId })
                });
                data = await response.json();
            } catch (error) {
                addMessage('לא הצלחתי למצוא את הכתובת. נסו לכתוב אותה בצורה מדויקת יותר.', 'bot');
                return;
            }
            address = data.address || enteredAddress;
            latitude = null;
            longitude = null;
            document.getElementById('addressInput').value = address;
            nearbyClasses = data.classes || [];
            searchedActivities = true;
            saveLocal();
            renderClasses();
            if (address) addMessage(`עדכנתי את העיר ל-${address}. הנה כמה רעיונות לפעילות קרובה.`, 'bot');
        }

        function shareLocation() {
            if (!navigator.geolocation) {
                addMessage('הדפדפן לא תומך בשיתוף מיקום.', 'bot');
                return;
            }
            navigator.geolocation.getCurrentPosition(async (position) => {
                let data;
                try {
                    const response = await fetch(`${apiBase}/api/location`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            session_id: sessionId
                        })
                    });
                    data = await response.json();
                } catch (error) {
                    addMessage('לא הצלחתי לעדכן מיקום דרך השרת. אפשר להזין כתובת ידנית.', 'bot');
                    return;
                }
                address = data.address || '';
                latitude = null;
                longitude = null;
                document.getElementById('addressInput').value = address;
                nearbyClasses = data.classes || [];
                searchedActivities = true;
                saveLocal();
                renderClasses();
                addMessage('המיקום עודכן כאזור משוער בלבד. הוספתי הצעות פעילות קרובות לפי הנקודה ששיתפת.', 'bot');
            }, () => addMessage('לא הצלחתי לקבל את המיקום. אפשר להזין כתובת ידנית.', 'bot'));
        }

        function renderClasses() {
            const table = document.getElementById('classesTable');
            table.innerHTML = '';
            if (!nearbyClasses.length) {
                const row = document.createElement('tr');
                const cell = document.createElement('td');
                cell.colSpan = 4;
                cell.textContent = searchedActivities
                    ? 'לא מצאתי כרגע מקומות פעילות מאומתים במקורות הפתוחים באזור הזה. כדאי לנסות כתובת רחבה יותר, שם שכונה, או לפנות למוקד העירוני.'
                    : 'כדי לראות פעילויות קרובות, הכניסו כתובת או שתפו מיקום בלחיצה על הכפתור.';
                row.appendChild(cell);
                table.appendChild(row);
                return;
            }
            nearbyClasses = nearbyClasses.map(normalizeActivity);
            saveLocal();
            nearbyClasses.forEach((item) => {
                const row = document.createElement('tr');
                const isRegistered = registered.includes(item.id);
                const nameCell = document.createElement('td');
                const locationCell = document.createElement('td');
                const timeCell = document.createElement('td');
                const actionCell = document.createElement('td');
                nameCell.textContent = item.name;
                timeCell.textContent = item.time;
                actionCell.textContent = item.description || describeActivity(item.name);

                const locationText = document.createElement('div');
                locationText.textContent = item.phone ? `${item.location} | ${item.phone}` : item.location;
                locationCell.appendChild(locationText);

                if (item.map_url) {
                    const mapLink = document.createElement('a');
                    mapLink.className = 'btn-action';
                    mapLink.href = item.map_url;
                    mapLink.target = '_blank';
                    mapLink.rel = 'noopener';
                    mapLink.textContent = 'מיקום במפה';
                    mapLink.style.marginInlineEnd = '6px';
                    mapLink.style.marginTop = '8px';
                    mapLink.style.display = 'inline-block';
                    locationCell.appendChild(mapLink);
                }
                const contactLink = document.createElement('a');
                contactLink.className = 'btn-action';
                contactLink.href = item.contact_url || searchContactUrl(item.name, item.location);
                contactLink.target = '_blank';
                contactLink.rel = 'noopener';
                contactLink.textContent = item.contact_url ? (isRegistered ? 'פתח פרטי קשר' : 'יצירת קשר') : 'חיפוש אתר';
                contactLink.style.marginTop = '8px';
                contactLink.style.display = 'inline-block';
                contactLink.addEventListener('click', () => {
                    if (!registered.includes(item.id)) registered.push(item.id);
                    saveLocal();
                });
                locationCell.appendChild(contactLink);
                row.append(nameCell, locationCell, timeCell, actionCell);
                table.appendChild(row);
            });
        }

        function addMedication() {
            const name = document.getElementById('medName').value.trim();
            const time = document.getElementById('medTime').value;
            if (!name || !time) return;
            medications.push({ name, time });
            document.getElementById('medName').value = '';
            document.getElementById('medTime').value = '';
            saveLocal();
            renderMedications();
            checkMedicationAlert();
        }

        function deleteMedication(index) {
            medications.splice(index, 1);
            saveLocal();
            renderMedications();
        }

        function renderMedications() {
            const table = document.getElementById('medicationsTable');
            table.innerHTML = '';
            medications.forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.name}</td>
                    <td>${item.time}</td>
                    <td><button class="btn-action btn-delete" onclick="deleteMedication(${index})">מחק</button></td>
                `;
                table.appendChild(row);
            });
        }

        function checkMedicationAlert() {
            const now = new Date();
            const current = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            const due = medications.find((item) => item.time === current);
            if (due && lastAlertMinute !== current) {
                lastAlertMinute = current;
                document.getElementById('alertMedName').textContent = due.name;
                document.getElementById('medicationAlert').style.display = 'block';
                playAlertSound();
                if (Notification.permission === 'granted') {
                    new Notification('תזכורת תרופה - MemoryLane AI', {
                        body: `הגיע הזמן לקחת ${due.name}.`,
                        requireInteraction: true,
                        silent: false,
                        vibrate: [240, 120, 240]
                    });
                }
            }
        }

        function dismissAlert() {
            document.getElementById('medicationAlert').style.display = 'none';
        }

        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; i += 1) outputArray[i] = rawData.charCodeAt(i);
            return outputArray;
        }

        async function enableNotifications() {
            if (!('Notification' in window)) {
                addMessage('הדפדפן הזה לא תומך בהתראות.', 'bot');
                return;
            }
            const permission = await Notification.requestPermission();
            if (permission !== 'granted') {
                addMessage('לא ניתן לשלוח התראות בלי אישור מהדפדפן.', 'bot');
                return;
            }

            try {
                if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
                    addMessage('התראות הופעלו בדפדפן, אבל Push כשהאתר סגור לא נתמך כאן.', 'bot');
                    return;
                }
                const keyResponse = await fetch(`${apiBase}/api/push/public-key`);
                const keyData = await keyResponse.json();
                if (!keyData.enabled || !keyData.publicKey) {
                    addMessage('התראות בדפדפן הופעלו. בשרת חסרה הגדרת Push מלאה להתראות כשהאתר סגור.', 'bot');
                    return;
                }
                const registration = await navigator.serviceWorker.register(`${apiBase}/sw.js`, { scope: `${apiBase}/` });
                const subscription = await registration.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(keyData.publicKey)
                });
                await fetch(`${apiBase}/api/push/subscribe`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(subscription)
                });
                pushSubscriptionReady = true;
                addMessage('התראות הופעלו. אם הדפדפן מאפשר זאת, תזכורות יוכלו להגיע גם כשהאתר סגור.', 'bot');
            } catch (error) {
                addMessage('התראות בדפדפן הופעלו, אבל חיבור Push לשרת נכשל כרגע.', 'bot');
            }
        }

        async function sendTestNotification() {
            playAlertSound();
            if (Notification.permission === 'granted') {
                new Notification('בדיקת התרעה - MemoryLane AI', {
                    body: 'אם שמעת צליל וראית הודעה, התרעות בדפדפן עובדות.',
                    requireInteraction: true,
                    silent: false
                });
                if (pushSubscriptionReady) {
                    try {
                        await fetch(`${apiBase}/api/push/test`, { method: 'POST' });
                    } catch (error) {
                        console.warn('Push test failed', error);
                    }
                }
            } else {
                addMessage('כדי להציג התרעת בדיקה צריך לאשר התרעות בדפדפן.', 'bot');
            }
        }

        document.getElementById('addressInput').value = '';
        renderClasses();
        renderMedications();
        checkMedicationAlert();
        setInterval(checkMedicationAlert, 1000);
    </script>
</body>
