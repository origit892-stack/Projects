<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Serpentine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #020617;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 100px rgba(204, 255, 0, 0.05);
            border-radius: 8px;
            overflow: hidden;
        }

        canvas {
            display: block;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        /* Frosted Glass UI */
        #ui-layer {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 20px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .score-label { font-size: 12px; font-weight: 300; letter-spacing: 2px; color: #94a3b8; }
        .score-value { font-size: 24px; font-weight: 600; color: #ccff00; text-shadow: 0 0 10px rgba(204, 255, 0, 0.5); }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: pointer;
            transition: opacity 0.5s;
        }

        #overlay h1 { font-weight: 300; letter-spacing: 8px; margin-bottom: 20px; font-size: 28px; }
        #overlay p { font-weight: 300; color: #94a3b8; letter-spacing: 1px; }
        #overlay.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    
    <div id="ui-layer">
        <div class="score-label">AETHER</div>
        <div class="score-value" id="score">0</div>
    </div>

    <div id="overlay">
        <h1>AETHER SERPENTINE</h1>
        <p>Click to Initialize Sequence</p>
    </div>
</div>

<script>
/** * AUDIO ENGINE (Web Audio API)
 */
const audio = {
    ctx: null,
    droneNode: null,
    init() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.startDrone();
    },
    startDrone() {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 55; // Low hum
        gain.gain.value = 0.05;
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        this.droneNode = { osc, gain };
    },
    playTurn() {
        if(!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        const filter = this.ctx.createBiquadFilter();
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.1);
        
        filter.type = 'highpass';
        filter.frequency.value = 1000;

        gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.1);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.1);
    },
    playEat() {
        if(!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, this.ctx.currentTime); // A5
        osc.frequency.setValueAtTime(1760, this.ctx.currentTime + 0.05); // A6
        
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3);

        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.3);
    },
    playCrash() {
        if(!this.ctx) return;
        const bufferSize = this.ctx.sampleRate * 1.0; 
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
        
        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(100, this.ctx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + 0.5);

        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.8, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.5);

        noise.connect(filter);
        filter.connect(gain);
        gain.connect(this.ctx.destination);
        noise.start();
    }
};

/** * ENGINE & STATE 
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

const COLS = 20;
const ROWS = 20;
const CELL = canvas.width / COLS;

let state = 'MENU'; // MENU, PLAY, DEAD
let lastTime = 0;
let logicTimer = 0;
let logicInterval = 150; 
let baseInterval = 150;

let snake = [];
let dir = {x: 1, y: 0};
let inputQueue = [];
let foodEaten = 0;

let food = {x: 15, y: 10, angle: 0, hover: 0};
let gridGlow = Array(COLS).fill().map(() => Array(ROWS).fill(0));
let ripples = [];
let particles = [];

let cameraShake = { x: 0, y: 0, intensity: 0 };
let freezeFrames = 0;

function resetGame() {
    snake = [
        {x: 5, y: 10, px: 5, py: 10},
        {x: 4, y: 10, px: 4, py: 10},
        {x: 3, y: 10, px: 3, py: 10}
    ];
    dir = {x: 1, y: 0};
    inputQueue = [];
    foodEaten = 0;
    logicInterval = baseInterval;
    scoreEl.innerText = "0";
    particles = [];
    ripples = [];
    spawnFood();
}

function spawnFood() {
    let valid = false;
    while (!valid) {
        food.x = Math.floor(Math.random() * COLS);
        food.y = Math.floor(Math.random() * ROWS);
        valid = !snake.some(s => s.x === food.x && s.y === food.y);
    }
}

/**
 * LOGIC LOOP (Fixed timestep)
 */
function updateLogic() {
    // Input processing
    if (inputQueue.length > 0) {
        let nextDir = inputQueue.shift();
        // Prevent 180 turns
        if (nextDir.x !== -dir.x && nextDir.y !== -dir.y) {
            dir = nextDir;
            audio.playTurn();
        }
    }

    let head = snake[0];
    let nx = head.x + dir.x;
    let ny = head.y + dir.y;

    // Wall collision
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) {
        triggerDeath();
        return;
    }
    // Self collision
    if (snake.some(s => s.x === nx && s.y === ny)) {
        triggerDeath();
        return;
    }

    // Save previous positions for LERP
    for (let i = 0; i < snake.length; i++) {
        snake[i].px = snake[i].x;
        snake[i].py = snake[i].y;
    }

    // Move body logically
    for (let i = snake.length - 1; i > 0; i--) {
        snake[i].x = snake[i - 1].x;
        snake[i].y = snake[i - 1].y;
    }
    snake[0].x = nx;
    snake[0].y = ny;

    // Grid glow interaction
    gridGlow[nx][ny] = 1.0;

    // Eat food
    if (nx === food.x && ny === food.y) {
        audio.playEat();
        foodEaten++;
        scoreEl.innerText = foodEaten * 10;
        
        // Speed up
        if (foodEaten % 3 === 0) {
            logicInterval = Math.max(50, logicInterval * 0.95);
        }

        // Add segment
        let tail = snake[snake.length - 1];
        snake.push({ x: tail.px, y: tail.py, px: tail.px, py: tail.py });

        // Visuals
        cameraShake.intensity = 2;
        ripples.push({ x: nx, y: ny, radius: 0, life: 1 });
        spawnFood();
    }
}

function triggerDeath() {
    state = 'DEAD';
    audio.playCrash();
    cameraShake.intensity = 15;
    freezeFrames = 15; // Hit stop effect

    // Shatter snake
    snake.forEach(seg => {
        for(let i=0; i<8; i++) {
            particles.push({
                x: seg.x * CELL + CELL/2,
                y: seg.y * CELL + CELL/2,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                life: 1.0,
                color: Math.random() > 0.5 ? '#50C878' : '#CCFF00'
            });
        }
    });
    snake = [];
}

/**
 * VISUAL RENDERING
 */
function lerp(start, end, t) {
    return start * (1 - t) + end * t;
}

function drawGrid(dt) {
    ctx.lineWidth = 1;
    for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
            // Fade glow
            gridGlow[x][y] = Math.max(0, gridGlow[x][y] - dt * 2);
            
            // Calculate ripple effect
            let rippleIntensity = 0;
            ripples.forEach(r => {
                let dist = Math.hypot(x - r.x, y - r.y);
                if (Math.abs(dist - r.radius) < 1.5) {
                    rippleIntensity += r.life;
                }
            });

            let glow = Math.max(gridGlow[x][y], rippleIntensity);
            
            ctx.strokeStyle = `rgba(204, 255, 0, ${0.05 + glow * 0.5})`;
            ctx.strokeRect(x * CELL, y * CELL, CELL, CELL);
        }
    }
}

function drawFood(dt) {
    food.angle += dt * 2;
    food.hover += dt * 3;
    let yOffset = Math.sin(food.hover) * 5;

    let cx = food.x * CELL + CELL/2;
    let cy = food.y * CELL + CELL/2 + yOffset;
    let size = CELL * 0.4;

    // Radial glow
    let grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, CELL);
    grad.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
    grad.addColorStop(0.2, 'rgba(204, 255, 0, 0.5)');
    grad.addColorStop(1, 'rgba(204, 255, 0, 0)');
    ctx.fillStyle = grad;
    ctx.fillRect(cx - CELL, cy - CELL, CELL*2, CELL*2);

    // 3D Octahedron projection simulation
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(size, size);
    
    let cos = Math.cos(food.angle);
    let sin = Math.sin(food.angle);
    
    let top = {x: 0, y: -1};
    let bottom = {x: 0, y: 1};
    let left = {x: -cos, y: 0.2 * sin}; // fake 3D tilt
    let right = {x: cos, y: -0.2 * sin};
    let front = {x: sin, y: 0.2 * cos};

    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 0.1;
    ctx.lineJoin = 'round';

    ctx.beginPath();
    // Top half
    ctx.moveTo(top.x, top.y); ctx.lineTo(left.x, left.y);
    ctx.moveTo(top.x, top.y); ctx.lineTo(right.x, right.y);
    ctx.moveTo(top.x, top.y); ctx.lineTo(front.x, front.y);
    // Bottom half
    ctx.moveTo(bottom.x, bottom.y); ctx.lineTo(left.x, left.y);
    ctx.moveTo(bottom.x, bottom.y); ctx.lineTo(right.x, right.y);
    ctx.moveTo(bottom.x, bottom.y); ctx.lineTo(front.x, front.y);
    // Equator
    ctx.moveTo(left.x, left.y); ctx.lineTo(front.x, front.y);
    ctx.lineTo(right.x, right.y);
    ctx.stroke();
    
    ctx.restore();
}

function drawSnake(lerpFactor) {
    if (snake.length === 0) return;

    // Interpolate positions
    let renderPos = snake.map(s => ({
        x: lerp(s.px, s.x, lerpFactor) * CELL + CELL/2,
        y: lerp(s.py, s.y, lerpFactor) * CELL + CELL/2
    }));

    // 1. Draw Energy Threads (Connections)
    ctx.beginPath();
    ctx.moveTo(renderPos[0].x, renderPos[0].y);
    for (let i = 1; i < renderPos.length; i++) {
        ctx.lineTo(renderPos[i].x, renderPos[i].y);
    }
    ctx.strokeStyle = 'rgba(80, 200, 120, 0.5)';
    ctx.lineWidth = 4;
    ctx.stroke();

    // 2. Draw Glass Pills
    renderPos.forEach((pos, i) => {
        let isHead = i === 0;
        let radius = isHead ? CELL * 0.45 : CELL * 0.35;
        
        // Gradient Pill
        let grad = ctx.createLinearGradient(pos.x, pos.y - radius, pos.x, pos.y + radius);
        grad.addColorStop(0, '#50C878'); // Emerald
        grad.addColorStop(1, '#CCFF00'); // Lime

        ctx.fillStyle = grad;
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
        ctx.fill();

        // Specular Highlight
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = 0.9;
        ctx.beginPath();
        ctx.arc(pos.x - radius * 0.3, pos.y - radius * 0.3, radius * 0.2, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.globalAlpha = 1.0;
    });
}

function updateAndDrawVFX(dt) {
    // Ripples
    for (let i = ripples.length - 1; i >= 0; i--) {
        let r = ripples[i];
        r.radius += dt * 15;
        r.life -= dt * 1.5;
        if (r.life <= 0) ripples.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        
        // Bounce
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

        p.life -= dt;
        
        if (p.life <= 0) {
            particles.splice(i, 1);
        } else {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    ctx.globalAlpha = 1.0;
}

/**
 * MAIN LOOP
 */
function loop(timestamp) {
    let dt = (timestamp - lastTime) / 1000;
    if (dt > 0.1) dt = 0.1; // Cap delta
    lastTime = timestamp;

    if (freezeFrames > 0) {
        freezeFrames--;
        requestAnimationFrame(loop);
        return;
    }

    // Logic tick
    if (state === 'PLAY') {
        logicTimer += dt * 1000;
        if (logicTimer >= logicInterval) {
            updateLogic();
            logicTimer -= logicInterval;
        }
    }

    // Clear
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Camera Shake
    ctx.save();
    if (cameraShake.intensity > 0.1) {
        ctx.translate(
            (Math.random() - 0.5) * cameraShake.intensity,
            (Math.random() - 0.5) * cameraShake.intensity
        );
        cameraShake.intensity *= 0.9; // Decay
    }

    drawGrid(dt);
    if (state === 'PLAY') {
        drawFood(dt);
        let lerpFactor = Math.min(1, logicTimer / logicInterval);
        drawSnake(lerpFactor);
    }
    updateAndDrawVFX(dt);

    // Vignette / Bloom edge effect
    let outerGrad = ctx.createRadialGradient(300, 300, 150, 300, 300, 400);
    outerGrad.addColorStop(0, 'rgba(2, 6, 23, 0)');
    outerGrad.addColorStop(1, 'rgba(2, 6, 23, 0.9)');
    ctx.fillStyle = outerGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.restore();

    requestAnimationFrame(loop);
}

/**
 * INPUT & EVENTS
 */
window.addEventListener('keydown', e => {
    if (state === 'MENU' || state === 'DEAD') return;
    
    const keyMap = {
        'ArrowUp': {x: 0, y: -1}, 'w': {x: 0, y: -1}, 'W': {x: 0, y: -1},
        'ArrowDown': {x: 0, y: 1}, 's': {x: 0, y: 1}, 'S': {x: 0, y: 1},
        'ArrowLeft': {x: -1, y: 0}, 'a': {x: -1, y: 0}, 'A': {x: -1, y: 0},
        'ArrowRight': {x: 1, y: 0}, 'd': {x: 1, y: 0}, 'D': {x: 1, y: 0}
    };

    if (keyMap[e.key]) {
        e.preventDefault();
        // Buffer max 2 inputs
        if (inputQueue.length < 2) {
            let lastDir = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : dir;
            let newDir = keyMap[e.key];
            // Don't queue if it's the exact same or 180 opposite to the last queued state
            if (!(newDir.x === lastDir.x && newDir.y === lastDir.y) && 
                !(newDir.x === -lastDir.x && newDir.y === -lastDir.y)) {
                inputQueue.push(newDir);
            }
        }
    }
});

document.getElementById('overlay').addEventListener('click', () => {
    document.getElementById('overlay').classList.add('hidden');
    if (state === 'MENU') {
        audio.init();
    }
    resetGame();
    state = 'PLAY';
});

// Start engine
requestAnimationFrame(loop);

</script>
</body>
</html>
