<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Dungeon Crawler</title>
  <meta name="description" content="A procedural dungeon crawler with seeded runs, persistent progression, loot, fog of war, and browser-based save/continue." />
  <meta property="og:title" content="The Dungeon Crawler" />
  <meta property="og:description" content="Delve procedural floors, keep your gear, and share seeds with a single URL." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="The Dungeon Crawler" />
  <meta name="twitter:description" content="Procedural dungeon crawling in the browser with persistent progression and seeded runs." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d0d1a;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Phaser mounts its canvas here */
    #game-container {
      width: 100%;
      height: 100%;
    }

    /* Hide Phaser's default canvas cursor so we can style it later */
    canvas { cursor: default; display: block; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="startup-hint" style="display:none; position:fixed; inset:0; align-items:center; justify-content:center; background:rgba(3,7,18,0.94); color:#e5e7eb; font-family:monospace; text-align:center; padding:24px; z-index:9998;">
    <div>
      <div style="font-size:28px; color:#ef4444; margin-bottom:12px;">Run From A Server</div>
      <div>Do not open this file directly with <code>file://</code>.</div>
      <div style="margin-top:8px;">Open the hosted game at <code>https://dungeon-crawler.ganz26.top/</code>.</div>
    </div>
  </div>

  <!-- Phaser 3 via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

  <!-- Multiplayer server config. The production WebSocket server is hosted on the
       dedicated Dungeon Crawler domain, so the lobby works from /dungeon-crawler/
       and from the shared /games folder in production. -->
  <script>
  window.MP_SERVER_HOST = 'dungeon-crawler.ganz26.top';
</script>

  <!-- Our game (ES module so Player import works) -->
  <script type="module" src="src/game.js"></script>
  <script>
    if (window.location.protocol === 'file:') {
      const hint = document.getElementById('startup-hint');
      if (hint) hint.style.display = 'flex';
    }
  </script>
</body>
</html>
