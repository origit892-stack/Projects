server {
    listen 80;
    listen [::]:80;
    listen 8080;
    listen [::]:8080;
    server_name ori-projects.ganz26.top ori-projects.*;

    root /opt/webapps/ori-projects;
    index index.html;

    location = /health {
        add_header Content-Type text/plain;
        return 200 "ori-projects ok\n";
    }

    location /memorylane-ai-api/ {
        proxy_pass http://127.0.0.1:5056/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /europa-park-planner-api/ {
        proxy_pass http://127.0.0.1:5057/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        add_header Cache-Control "no-store" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store" always;
    }
}
