<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#071d49">
  <meta name="description" content="מפת המתקנים האינטראקטיבית של Europa-Park">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <title>מפת הפארק — Europa Crew</title>
  <style>
    :root{--navy:#071d49;--navy2:#0d3474;--blue:#1268d7;--gold:#ffc928;--ink:#10213d;--muted:#68758c;--line:#e4eaf3;--soft:#f5f8fc;--white:#fff;--shadow:0 16px 42px rgba(7,29,73,.12)}
    *{box-sizing:border-box}html,body{height:100%}body{margin:0;min-width:320px;display:grid;grid-template-rows:auto 1fr;font-family:Arial,"Noto Sans Hebrew",sans-serif;color:var(--ink);background:#eef3f9}button,input{font:inherit}.topbar{position:relative;z-index:1000;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:15px clamp(14px,3vw,36px);color:#fff;background:linear-gradient(110deg,#06183c,#0d3474);box-shadow:0 6px 24px rgba(7,29,73,.2)}.brand{display:flex;align-items:center;gap:11px;color:#fff;font-size:19px;font-weight:900;text-decoration:none}.brand-mark{width:40px;height:40px;display:grid;place-items:center;border-radius:12px;color:var(--navy);background:var(--gold);transform:rotate(-5deg)}.back-link{padding:9px 14px;border:1px solid rgba(255,255,255,.24);border-radius:999px;color:#fff;background:rgba(255,255,255,.08);font-size:12px;font-weight:800;text-decoration:none}.back-link:hover{background:rgba(255,255,255,.16)}.map-shell{position:relative;min-height:0}.map-panel{position:absolute;z-index:800;top:18px;right:18px;width:min(390px,calc(100% - 36px));padding:18px;border:1px solid rgba(255,255,255,.8);border-radius:20px;background:rgba(255,255,255,.95);box-shadow:var(--shadow);backdrop-filter:blur(12px)}.map-panel h1{margin:0;color:var(--navy);font-size:25px;letter-spacing:-.04em}.map-panel p{margin:5px 0 15px;color:var(--muted);font-size:11px;line-height:1.5}.map-controls{display:grid;grid-template-columns:1fr auto;gap:8px}.map-search{min-width:0;height:43px;padding:0 12px;border:1px solid var(--line);border-radius:11px;background:#f9fbfe;outline:0}.map-search:focus{border-color:#8bb9ee;box-shadow:0 0 0 3px rgba(18,104,215,.11)}.chosen-toggle{height:43px;display:flex;align-items:center;gap:7px;padding:0 11px;border:1px solid var(--line);border-radius:11px;color:var(--muted);background:#f9fbfe;cursor:pointer;font-size:10px;font-weight:900;white-space:nowrap}.chosen-toggle input{width:17px;height:17px;accent-color:var(--blue)}.map-status{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:11px;color:var(--muted);font-size:10px}.map-status a{color:var(--blue)}#parkMap{width:100%;height:100%;min-height:560px;background:#dce7ef}.leaflet-container{font-family:Arial,"Noto Sans Hebrew",sans-serif}.leaflet-popup-content-wrapper{border-radius:14px;box-shadow:0 12px 35px rgba(7,29,73,.2)}.leaflet-popup-content{margin:11px}.leaflet-control-attribution{font-size:9px!important}.map-pin-popup{width:220px;text-align:right;direction:rtl}.map-pin-popup img{width:100%;height:105px;display:block;margin-bottom:10px;border-radius:9px;object-fit:cover}.map-pin-popup strong{display:block;color:var(--navy);font-size:14px;direction:ltr;text-align:right}.map-pin-popup span{display:block;margin:5px 0 9px;color:var(--muted);font-size:11px}.map-popup-actions{display:flex;gap:6px}.map-popup-actions a{flex:1;padding:8px 5px;border-radius:8px;color:#fff;background:var(--blue);font-size:10px;font-weight:800;text-align:center;text-decoration:none}.map-popup-actions a:last-child{background:var(--navy2)}
    @media(max-width:640px){.topbar{padding:11px 12px}.brand{font-size:15px}.brand-mark{width:36px;height:36px}.back-link{padding:8px 10px;font-size:10px}.map-panel{top:10px;right:10px;width:calc(100% - 20px);padding:14px;border-radius:16px}.map-panel h1{font-size:20px}.map-panel p{display:none}.map-controls{margin-top:10px;grid-template-columns:1fr}.chosen-toggle{justify-content:center}.map-status span:last-child{display:none}#parkMap{min-height:520px}}
  </style>
</head>
<body>
  <header class="topbar"><a class="brand" href="index.html"><span class="brand-mark">EP</span><span>Europa Crew</span></a><a class="back-link" href="index.html">חזרה לתכנון ←</a></header>
  <main class="map-shell">
    <section class="map-panel" aria-labelledby="map-title"><h1 id="map-title">מפת המתקנים</h1><p>כל המיקומים בפארק. המתקנים שבחרת מסומנים בצהוב.</p><div class="map-controls"><input class="map-search" id="mapSearch" type="search" placeholder="חיפוש מתקן או מדינה…" aria-label="חיפוש מתקן במפה"><label class="chosen-toggle"><input id="mapChosenOnly" type="checkbox">רק מה שבחרתי</label></div><div class="map-status"><span id="mapStatus">טוען מיקומים…</span><span><a href="https://www.europapark.de/en/theme-park/attractions/interactive-europa-park-park-map" target="_blank" rel="noopener">המפה הרשמית</a> · OpenStreetMap</span></div></section>
    <div id="parkMap" role="application" aria-label="מפה אינטראקטיבית של מתקני Europa-Park"></div>
  </main>
  <script src="attractions.js"></script>
  <script src="map-data.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="map.js"></script>
</body>
</html>
